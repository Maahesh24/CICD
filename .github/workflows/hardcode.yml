# File: .github/workflows/demo.yml

name: hardcode

on:
  workflow_dispatch:

jobs:
  setup:
    name: Setup Environment
    runs-on: [self-hosted, macOS, X64]
    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: |
            {
              "clientId": "98df0580-39b3-4c8d-80ec-5143ae025113",
              "clientSecret": "lgK8Q~yYuzLOmHCaH_T6a32wlNGjNYRbz1DS9ban",
              "subscriptionId": "669e5a53-2952-45fd-a198-1f4a3bdba879",
              "tenantId": "c85c100b-90ef-4945-b745-30b32789f421"
            }
          auth-type: SERVICE_PRINCIPAL

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

  plan:
    name: Terraform Plan
    runs-on: [self-hosted, macOS, X64]
    needs: setup
    steps:
      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: "98df0580-39b3-4c8d-80ec-5143ae025113"
          ARM_CLIENT_SECRET: "lgK8Q~yYuzLOmHCaH_T6a32wlNGjNYRbz1DS9ban"
          ARM_TENANT_ID: "c85c100b-90ef-4945-b745-30b32789f421"
          ARM_SUBSCRIPTION_ID: "669e5a53-2952-45fd-a198-1f4a3bdba879"

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          ARM_CLIENT_ID: "98df0580-39b3-4c8d-80ec-5143ae025113"
          ARM_CLIENT_SECRET: "lgK8Q~yYuzLOmHCaH_T6a32wlNGjNYRbz1DS9ban"
          ARM_TENANT_ID: "c85c100b-90ef-4945-b745-30b32789f421"
          ARM_SUBSCRIPTION_ID: "669e5a53-2952-45fd-a198-1f4a3bdba879"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  apply:
    name: Terraform Apply
    runs-on: [self-hosted, macOS, X64]
    needs: plan
    steps:
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: "98df0580-39b3-4c8d-80ec-5143ae025113"
          ARM_CLIENT_SECRET: "lgK8Q~yYuzLOmHCaH_T6a32wlNGjNYRbz1DS9ban"
          ARM_TENANT_ID: "c85c100b-90ef-4945-b745-30b32789f421"
          ARM_SUBSCRIPTION_ID: "669e5a53-2952-45fd-a198-1f4a3bdba879"
