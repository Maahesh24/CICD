# File: .github/workflows/workflow.yml

name: Deploy to Staging

on:
  workflow_dispatch:

jobs:
  my_job:
    name: deploy to staging
    runs-on: ubuntu-latest

    steps:
      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Azure Login using Service Principal
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ef918e69-be10-4267-9ac6-87000e61deb6
          client-secret: ${{ secrets.AZURE
